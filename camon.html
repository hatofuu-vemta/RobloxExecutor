<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Gửi thành công</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }

    .check {
      font-size: 60px;
      color: #4CAF50;
    }

    h1 {
      margin: 15px 0 10px;
    }

    p {
      color: #666;
    }

    a {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      background: #2193b0;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      background: #176d85;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="check">✔️</div>
    <h1>Gửi thành công!</h1>
    <p>Cảm ơn bạn đã liên hệ 💖<br>Mình sẽ phản hồi sớm nhất có thể.</p>

    <a href="index.html">Quay lại trang chính</a>
  </div>

</body>
</html>
